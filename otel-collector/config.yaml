receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  
  resource:
    attributes:
      - key: service.namespace
        value: "my-application-group"
        action: upsert
      - key: deployment.environment
        value: "production"
        action: upsert

exporters:
  otlphttp:
    endpoint: https://otlp-gateway-prod-eu-west-2.grafana.net/otlp
    headers:
      Authorization: "Basic MTUxMzQ3NTpnbGNfZXlKdklqb2lNVFkxTnpZd05DSXNJbTRpT2lKdGVTMXZkR1ZzTFhSdmEyVnVJaXdpYXlJNklqZ3pUREprY1ZZNVJuY3laemt4ZFVsS2RUbE9PWEJVTlNJc0ltMGlPbnNpY2lJNkluQnliMlF0WlhVdGQyVnpkQzB5SW4xOQ=="

  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp, debug]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp]
